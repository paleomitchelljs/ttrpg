# Shadowdark items database.
#
# Edit this file to add or change items. Build the app (npm run build) and the
# new items will show up everywhere — equipment dropdowns, character gear, etc.
#
# Each item:
#   id           required — kebab-case, unique. Used internally; the display name
#                can change without breaking saved characters.
#   name         required — what the player sees.
#   category     required — one of: weapon | armor | shield | helmet | gear | consumable
#   cost         optional — display string like "5gp", "5sp", "5cp".
#   slots        optional — gear slots taken when carried (default 1).
#   tags         optional — free-form list. Used for filtering and rules.
#                Suggested tags:
#                  weapons: melee, ranged, thrown, two-handed, finesse, versatile
#                  armor:   disadv-stealth, disadv-swim
#                  items:   light, holy, magic, undead-bane, drink, food
#   notes        optional — short description.
#
# Source-tracking fields (optional, for filtering/grouping by origin):
#   system       slug of source RPG system. Examples:
#                  shadowdark-core, morrowind, eq-rpg, p1999-wiki, wotc-3e
#   source_book  slug of specific book within the system. Examples:
#                  item-guide-revised, players-handbook, al-kabors-arcana,
#                  everfrost-peaks, forests-of-faydark, monsters-of-luclin,
#                  soluseks-eye, temple-of-solusek-ro, befallen
#   source_page  integer page number in the source PDF (1-indexed) for traceability.
#
# Weapon-only fields:
#   damage_one   damage die when wielded one-handed, e.g. "d8".
#   damage_two   damage die when wielded two-handed (versatile). Same as
#                damage_one for non-versatile weapons.
#
# Armor-only fields:
#   ac_base      base AC value, e.g. 11 for leather, 13 for chainmail, 15 plate.
#   ac_dex       true if DEX modifier still applies on top of base.
#
# Shield/helmet-only field:
#   ac_bonus     flat bonus added to AC when equipped.

