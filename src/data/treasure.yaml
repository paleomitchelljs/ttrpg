  - id: gs-cloud-diadem
    name: The Cloud Diadem
    tier: 4
    tags: [magic, crown, artifact, unique]
    notes: "Silver circlet set with a pale gem. Telepathically steers Ironcloud Keep. The wearer also hears the alchemic bomb's status — shatter the gem and the bomb detonates."
    system: shadowdark-core
    source_book: shadowdark-quickstart

  - id: gs-orb-of-red-dragonkind
    name: Orb of Red Dragonkind
    tier: 4
    tags: [magic, artifact, dragon]
    notes: "Fist-sized ruby orb. Dominate one red dragon at a time (1/day, DC 14 WIS). Bearer is immune to fire while holding it."
    system: shadowdark-core
    source_book: shadowdark-quickstart

  - id: gs-black-comet-heart
    name: The Black Comet Heart
    tier: 4
    tags: [magic, relic, artifact, planar]
    notes: "Chunk of black diamond fallen from the sky. 1/day calls down extraplanar meteorites: 6d6 in a far-radius blast, DC 15 DEX for half."
    system: shadowdark-core
    source_book: shadowdark-quickstart

  - id: gs-roc-rider-badge
    name: Roc Rider Badge
    tier: 3
    tags: [magic, pin, neck]
    value: "17000gp"
    notes: "Giant-sized silver brooch. Wearer (and flying mount) can pass freely through Ironcloud Keep's energy field within near-radius."
    system: shadowdark-core
    source_book: shadowdark-quickstart

  - id: gs-stormlords-helm
    name: Stormlord's Helm
    tier: 3
    tags: [magic, helm, lightning]
    notes: "Giant-sized iron helm crowned with bronze antlers. Wearer is immune to lightning damage and can discharge a stored lightning bolt 1/day (3d6, far, DC 14 DEX half)."
    system: shadowdark-core
    source_book: shadowdark-quickstart

  - id: gs-scope-of-stormsight
    name: Scope of Stormsight
    tier: 3
    tags: [magic, lens, siege]
    value: "18000gp"
    notes: "Brass tube with blue crystal lenses for a siege engine. Crew sees through darkness, fog, smoke. 1/round pinpoint an invisible creature in line of sight."
    system: shadowdark-core
    source_book: shadowdark-quickstart

  - id: gs-cloud-giant-bag
    name: Cloud Giant's Treasure Bag
    tier: 2
    tags: [art, treasure-roll]
    notes: "Roll d8: 1) black pearls (500gp), 2) silver cameo (250gp), 3) two javelins of lightning, 4) saffron bag (200gp), 5) framed valley watercolor, 6) platinum tuning fork (450gp), 7) book of cloud-giant poetry, 8) crystal decanter of absinthe."
    system: shadowdark-core
    source_book: shadowdark-quickstart

  - id: gs-volstus-gem-hoard
    name: Volstus's Gem Hoard
    tier: 4
    tags: [art, gems, treasure]
    value: "40250gp"
    notes: "Giant-sized chest: 1,580 platinum, 13,290 gold, 20,900 silver, plus cut amethysts, aquamarines, black pearls, blue spinels, and smoky quartzes. Weighs hundreds of pounds."
    system: shadowdark-core
    source_book: shadowdark-quickstart

  - id: gs-cloud-tomes
    name: Hoard of Cloud Giant Tomes
    tier: 3
    tags: [art, books, knowledge]
    notes: "Hundreds of huge volumes in Giant. Near-complete history of Golarion and the Great Beyond. A scholarly faction will pay handsomely — if you can haul them out."

  # ═══════════════════════════════════════════
  # EverQuest classics (eq-*)
  # Icons pulled from wiki.project1999.com under /public/icons/eq/.
  # ═══════════════════════════════════════════
    system: shadowdark-core
    source_book: shadowdark-quickstart

  - id: eq-flowing-black-silk-sash
    name: Flowing Black Silk Sash
    tier: 3
    tags: [magic, belt, monk, haste]
    icon: icons/eq/flowing-black-silk-sash.png
    notes: "Black silk woven so finely it ripples in still air. +1 AC. The wearer moves with unnatural quickness: on a natural 20 on a melee attack, immediately make one bonus melee attack against the same target. Coveted by monks who go without armor."
    system: eq-rpg
    source_book: item-guide-revised

  - id: eq-cloak-of-flames
    name: Cloak of Flames
    tier: 4
    tags: [magic, cloak, fire, haste]
    icon: icons/eq/cloak-of-flames.png
    notes: "A cloak woven from living flame that never burns the wearer. +1 to STR checks and saves. Wearer takes half damage from fire. On a natural 19 or 20 on a melee attack, the cloak flares and the wearer makes one bonus melee attack wreathed in flame — on a hit, that bonus attack deals an extra 1d4 fire damage."
    system: eq-rpg
    source_book: item-guide-revised

  - id: eq-red-dragon-tooth
    name: Red Dragon Tooth
    tier: 3
    tags: [magic, dragon, summon, component]
    value: "500gp"
    icon: icons/eq/red-dragon-tooth.png
    notes: "A foot-long ivory tooth, still warm to the touch. 1/day, plant the tooth in the ground and speak the dragon's true name to summon a spectre that obeys the wielder for 10 minutes (HP 6, AC 13, fly close, incorporeal touch +3 1d4 cold). Also serves as the critical reagent in the lost rites that forge the Wurmslayer."
    system: eq-rpg
    source_book: item-guide-revised

  - id: eq-wurmslayer
    name: Wurmslayer
    tier: 4
    tags: [magic, weapon, sword, dragon-bane]
    icon: icons/eq/wurmslayer.png
    notes: "A two-handed sword forged around a red dragon's tooth. Slow but devastating — its strikes are at disadvantage against nimble foes, but it deals an extra 1d8 against dragons, drakes, wyverns, and any creature with the 'dragon' tag. +1 to attack and damage."
    system: eq-rpg
    source_book: item-guide-revised

  - id: eq-fungus-covered-scale-tunic
    name: Fungus-Covered Scale Tunic
    tier: 4
    tags: [magic, armor, regeneration]
    icon: icons/eq/fungus-covered-scale-tunic.png
    notes: "Scale armor riddled with pulsing luminescent mold. AC as chainmail. Passive regeneration: at the start of each of the wearer's turns, regain 1 HP (in or out of combat). Stinks faintly of cellar damp — disadvantage on stealth in still air."
    system: eq-rpg
    source_book: item-guide-revised

  - id: eq-staff-of-dreaded-gaze
    name: Staff of the Dreaded Gaze
    tier: 3
    tags: [magic, staff, fear]
    icon: icons/eq/staff-of-dreaded-gaze.png
    notes: "A blackthorn staff topped with a single unblinking eye. Functions as a normal staff in melee. 1/day the wielder may level the eye at one creature within near range and cast Fear: DC 14 WIS save or flee at full speed for 1d4 rounds. The eye watches everything."
    system: eq-rpg
    source_book: item-guide-revised

  - id: eq-sarnak-battle-shield
    name: Sarnak Battle Shield
    tier: 3
    tags: [magic, shield, resistance]
    icon: icons/eq/sarnak-battle-shield.png
    notes: "A heavy iron shield embossed with the snarling visage of a sarnak warrior. Acts as a shield (+2 AC). Wielder has advantage on saves against breath weapons and elemental damage (fire, cold, lightning, acid)."
    system: eq-rpg
    source_book: item-guide-revised

  - id: eq-stein-of-moggok
    name: Stein of Moggok
    tier: 3
    tags: [magic, drink, spellcasting]
    icon: icons/eq/stein-of-moggok.png
    notes: "An oversized pewter stein engraved with ogre runes. 1/day, draining the stein lets a caster recover one tier-1 or tier-2 spell they lost from a failed casting check earlier today. The ale tastes foul but the magic surges back. Refills at dawn."
    system: eq-rpg
    source_book: item-guide-revised

  - id: eq-guise-of-the-deceiver
    name: Guise of the Deceiver
    tier: 4
    tags: [magic, mask, helm, illusion]
    icon: icons/eq/guise-of-the-deceiver.png
    notes: "A featureless porcelain mask that warms when worn. Wearer appears as a dark elf to all onlookers. Convinces casual observers; close inspection requires DC 14 WIS save to see through. Removing the mask drops the illusion instantly."
    system: eq-rpg
    source_book: item-guide-revised

  - id: eq-circlet-of-shadow
    name: Circlet of Shadow
    tier: 3
    tags: [magic, helm, light, stealth]
    icon: icons/eq/circlet-of-shadow.png
    notes: "A slim silver circlet that catches starlight even underground. +1 to AC. +1 to CHA checks and saves. Sheds faint silver light at close range without revealing the wearer's position — does not count as a torch for Shadowdark's light-source rules."
    system: eq-rpg
    source_book: item-guide-revised

  - id: eq-greenmist
    name: Greenmist
    tier: 4
    tags: [magic, weapon, sword, lifesteal, drain]
    icon: icons/eq/greenmist.png
    notes: "A serpentine sword that drips sickly green vapor; the air around it tastes of iron and rot. +1 to attack and damage. On a natural 20, the mist lashes out — the wielder regains 1d6 HP drained from the target, the target's AC drops by 1 until they rest, and the wielder gains +1 AC for the rest of the fight (does not stack with itself)."

