# Treasure table for random rolls.
#
# Each entry:
#   id, name        — required
#   tier            — 1 (junk/coin), 2 (decent), 3 (valuable/magical)
#   tags            — coin, gem, art, potion, scroll, magic, mundane
#   value           — display string ("3d6 sp", "100gp", "priceless")
#   notes           — optional flavor
#
# Source-tracking fields (optional, for filtering by origin):
#   system       slug of source RPG system (shadowdark-core, eq-rpg, etc.)
#   source_book  slug of specific book (everfrost-peaks, etc.)
#   source_page  integer page number in source PDF

treasure:
