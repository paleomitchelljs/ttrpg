    system: wotc-3e
    source_book: sunless-citadel

  - id: sc-goblin-chiefs-chest
    name: Goblin Chief's Iron Chest
    tier: 2
    tags: [treasure, container, trap]
    value: "231gp + gems"
    notes: "231gp, two 30gp onyx gems, two doses of antitoxin, a scroll of knock, a potion of cat's grace. Lock is rigged with a poison needle."

