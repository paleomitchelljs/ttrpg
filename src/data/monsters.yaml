# Shadowdark monsters.
#
# Edit this file to add or change monsters. Numbers loosely follow the Shadowdark
# Quickstart bestiary — adjust freely for your table.
#
# Each monster:
#   id        required — kebab-case unique key.
#   name      required — display name.
#   hp_max    required — full hit points.
#   ac        required — Armor Class.
#   move      optional — "near" | "double-near" | "far" | "burrow near" etc.
#   level    optional — monster level (used for filtering encounters by party tier).
#   tags      optional — type/role tags. Suggested:
#              tier-1, tier-2, tier-3, boss
#              humanoid, beast, undead, monstrosity, ooze, fey, dragon
#              swarm, sneaky, brute, caster
#   attacks   list of attack actions:
#              name    — what to call it
#              bonus   — to-hit modifier (number, not string)
#              damage  — dice expression like "1d6" or "1d8+2"
#              note    — optional rider, e.g. "On hit: target drops 1 item."
#   notes     optional — flavor or special rules.

monsters:
  # ───────── Tier 1 — easy fights ─────────
  - id: kobold
    name: Kobold
    hp_max: 3
    ac: 12
    move: near
    level: 0
    tags: [tier-1, humanoid, sneaky, swarm]
    attacks:
      - { name: Bite, bonus: 0, damage: 1d4 }
    notes: "Yappy, cowardly. Deals in numbers."

  - id: giant-rat
    name: Giant Rat
    hp_max: 4
    ac: 11
    move: near
    level: 0
    tags: [tier-1, beast, swarm]
    attacks:
      - { name: Bite, bonus: 1, damage: 1d4 }
    notes: "Lives in tight, dark places."

  - id: bat
    name: Bat
    hp_max: 2
    ac: 12
    move: double-near (fly)
    level: 0
    tags: [tier-1, beast, swarm]
    attacks:
      - { name: Bite, bonus: 0, damage: 1 }
    notes: "Hard to hit in the dark."

  - id: giant-spider
    name: Giant Spider
    hp_max: 5
    ac: 13
    move: near
    level: 1
    tags: [tier-1, beast]
    attacks:
      - { name: Bite, bonus: 2, damage: 1d6, note: "On hit: DC 12 CON save or be poisoned." }
    notes: "Lurks on web-strewn ceilings."

  - id: goblin
    name: Goblin
    hp_max: 4
    ac: 12
    move: near
    level: 1
    tags: [tier-1, humanoid, sneaky]
    attacks:
      - { name: Scimitar, bonus: 1, damage: 1d6 }
    notes: "Vicious in packs, cowardly alone."

  - id: skeleton
    name: Skeleton
    hp_max: 4
    ac: 11
    move: near
    level: 1
    tags: [tier-1, undead]
    attacks:
      - { name: Rusty Sword, bonus: 1, damage: 1d6 }
    notes: "Crumbles when struck. Resistant to piercing."

  - id: bandit
    name: Bandit
    hp_max: 5
    ac: 12
    move: near
    level: 1
    tags: [tier-1, humanoid]
    attacks:
      - { name: Shortsword, bonus: 1, damage: 1d6 }
      - { name: Shortbow, bonus: 1, damage: 1d6 }
    notes: "Travels in twos and threes."

  - id: zombie
    name: Zombie
    hp_max: 7
    ac: 9
    move: near
    level: 1
    tags: [tier-1, undead, brute]
    attacks:
      - { name: Slam, bonus: 2, damage: 1d6 }
    notes: "Slow but tough. Won't stay down."

  # ───────── Tier 2 — real threats ─────────
  - id: wolf
    name: Wolf
    hp_max: 8
    ac: 12
    move: double-near
    level: 2
    tags: [tier-2, beast]
    attacks:
      - { name: Bite, bonus: 2, damage: 1d6, note: "On hit: target falls prone." }
    notes: "Hunts in pairs or packs."

  - id: orc
    name: Orc
    hp_max: 9
    ac: 13
    move: near
    level: 2
    tags: [tier-2, humanoid, brute]
    attacks:
      - { name: Battleaxe, bonus: 3, damage: 1d8 }
    notes: "Charges first, thinks never."

  - id: ghoul
    name: Ghoul
    hp_max: 9
    ac: 12
    move: near
    level: 2
    tags: [tier-2, undead]
    attacks:
      - { name: Claws, bonus: 2, damage: 1d4, note: "On hit: DC 12 CON save or paralyzed for 1d4 rounds." }
    notes: "Reeks of grave-dirt."

  - id: slime
    name: Green Slime
    hp_max: 6
    ac: 9
    move: close
    level: 2
    tags: [tier-2, ooze]
    attacks:
      - { name: Engulf, bonus: 1, damage: 1d6, note: "On hit: corrodes armor by 1 point." }
    notes: "Drips from cave ceilings. Silent."

  - id: mimic
    name: Mimic
    hp_max: 12
    ac: 13
    move: close
    level: 3
    tags: [tier-2, monstrosity, sneaky]
    attacks:
      - { name: Bite, bonus: 3, damage: 1d8, note: "On hit: stuck fast (DC 12 STR to escape)." }
    notes: "Disguises as a chest, a door, a statue."

  # ───────── Tier 3 — bosses ─────────
  - id: goblin-boss
    name: Goblin Boss
    hp_max: 12
    ac: 14
    move: near
    level: 3
    tags: [tier-3, humanoid, boss]
    attacks:
      - { name: Scimitar, bonus: 3, damage: 1d6 }
      - { name: Throw Dagger, bonus: 3, damage: 1d4 }
    notes: "Commands lesser goblins. Cowardly when alone."

  - id: owlbear
    name: Owlbear
    hp_max: 25
    ac: 13
    move: near
    level: 4
    tags: [tier-3, beast, boss, brute]
    attacks:
      - { name: Claws, bonus: 4, damage: 1d8 }
      - { name: Bite, bonus: 4, damage: 1d8 }
    notes: "Charges with a screech that shakes the trees."
