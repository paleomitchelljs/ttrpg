# Active Pool — controls which entries are eligible for random rolls.
#
# Pools are named filter sets. Define as many as you like; one is `active`.
# When a random roll happens (Dungeons tab "Roll a scene", treasure, trap, etc.),
# only entries whose `tags` OR `system` field intersects the active pool's
# `enabled_tags` are eligible.
#
# Empty `enabled_tags` (or pool id `everything`) disables filtering entirely.
#
# Match rule: an entry is active iff any of these is true —
#   1. `enabled_tags` is empty.
#   2. The entry's `system` field is in `enabled_tags`.
#   3. The entry's `source_book` field is in `enabled_tags`.
#   4. Any of the entry's `tags` array is in `enabled_tags`.

active: everything

pools:
  - id: everything
    name: "Everything (no filter)"
    description: "All entries in every YAML file are eligible. Default for browsing."
    enabled_tags: []

  - id: shadowdark-only
    name: "Shadowdark core only"
    description: "Just the vanilla Shadowdark quickstart entries — no licensed content."
    enabled_tags: [shadowdark-core]

  - id: sunless-citadel
    name: "The Sunless Citadel (D&D 3e)"
    description: "Run the classic Sunless Citadel adventure — only its content rolls."
    enabled_tags: [wotc-3e, sunless-citadel, sc-]

  - id: whispering-cairn
    name: "The Whispering Cairn (Dungeon Magazine #124)"
    description: "Age of Worms opening adventure."
    enabled_tags: [dungeon-magazine, dungeon-124-whispering-cairn, wc-]

  - id: everquest-classic
    name: "EverQuest — Classic era"
    description: "Original EverQuest dungeons and creatures: Befallen, Blackburrow, Solusek's Eye, Permafrost, etc."
    enabled_tags: [eq-rpg, era-classic, befallen, soluseks-eye, temple-of-solusek-ro, everfrost-peaks]

  - id: everquest-kunark
    name: "EverQuest — Ruins of Kunark"
    description: "Iksar lands: Dalnir, Chardok, Howling Stones, Sebilis."
    enabled_tags: [eq-rpg, era-kunark, kunark]

  - id: everquest-velious
    name: "EverQuest — Scars of Velious"
    description: "Frozen north: Crystal Caverns, Kael Drakkel, Temple of Veeshan."
    enabled_tags: [eq-rpg, era-velious, velious]

  - id: everquest-luclin
    name: "EverQuest — Shadows of Luclin"
    description: "The moon and its alien creatures."
    enabled_tags: [eq-rpg, monsters-of-luclin, luclin]

  - id: faydark-campaign
    name: "Forests of Faydark campaign"
    description: "Wood elves, dark elves, fae, Crushbone, Mistmoore."
    enabled_tags: [forests-of-faydark, fey, eq-rpg]

  - id: kid-easy
    name: "Easy mode (tier-1 only)"
    description: "Only tier-1 monsters and basic items. For very young players."
    enabled_tags: [tier-1, shadowdark-core]
