# Map database — reference images extracted from source adventure PDFs.
#
# Images live under public/maps/ so they're served as static files. The
# `image` field is the path relative to public/ (i.e. what you'd put in
# an <img src="..."> when the app is served).
#
# Each map:
#   id           required — kebab-case, unique
#   name         required — display name
#   source       required — short label for the source adventure/book
#   source_page  optional — page number in the source PDF (1-indexed)
#   category     required — one of: region | settlement | dungeon | building | overview
#   image        required — path under public/, e.g. maps/sunless-citadel/grove-level.png
#   tags         optional — free-form (color, b&w, grid, parchment, fold-out, etc.)
#   description  optional — short note about what the map shows

maps:
  # ───────── The Sunless Citadel ─────────
  - id: sc-overland
    name: Overland Map
    source: The Sunless Citadel
    source_page: 2
    category: region
    image: maps/sunless-citadel/overland.png
    tags: [b&w, parchment]
    description: "The region around Oakhurst — the Old Road, the New Road, Ashen Plain, and the Citadel itself."
    system: wotc-3e
    source_book: sunless-citadel

  - id: sc-oakhurst
    name: Oakhurst
    source: The Sunless Citadel
    source_page: 2
    category: settlement
    image: maps/sunless-citadel/oakhurst.png
    tags: [b&w, parchment]
    description: "The village of Oakhurst — Mayor's house, Merchant, Inn of Boars, jail, smithy, and Old Road."
    system: wotc-3e
    source_book: sunless-citadel

  - id: sc-cutaway
    name: Sunless Citadel — Cutaway
    source: The Sunless Citadel
    source_page: 2
    category: overview
    image: maps/sunless-citadel/cutaway.png
    tags: [b&w, parchment]
    description: "Side-view cutaway showing how the Fortress Level sits above the Grove Level."
    system: wotc-3e
    source_book: sunless-citadel

  - id: sc-fortress-level
    name: Sunless Citadel — Fortress Level
    source: The Sunless Citadel
    source_page: 2
    category: dungeon
    image: maps/sunless-citadel/fortress-level.png
    tags: [b&w, grid]
    description: "Upper dungeon level of the Sunless Citadel, rooms 1–41. Key shows half-walls, stairs, normal/stone/secret doors, and traps."
    system: wotc-3e
    source_book: sunless-citadel

  - id: sc-grove-level
    name: Sunless Citadel — Grove Level
    source: The Sunless Citadel
    source_page: 35
    category: dungeon
    image: maps/sunless-citadel/grove-level.png
    tags: [b&w, grid]
    description: "Lower dungeon level — the Twilight Grove. Rooms 42–56, with stairs to the Underdark on the west edge."

