<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Red Dragon Labyrinth</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <div id="app">

    <section id="screen-title" class="screen title-screen">
      <img class="title-dragon-img" src="./assets/dragon-fire.png" alt="A red dragon breathing fire">
      <h1>Red Dragon Labyrinth</h1>
      <p class="tagline">Raid the maze. Grow the hoard.</p>
      <div class="menu">
        <button id="btn-new" class="btn btn-big">🔥 New Game</button>
        <button id="btn-continue" class="btn btn-big" hidden>📜 Continue</button>
      </div>
      <p id="title-hoard" class="title-hoard"></p>
    </section>

    <section id="screen-game" class="screen" hidden>
      <header id="hud">
        <span id="hud-hp" class="hud-chip">
          <svg class="chip-icon" viewBox="0 0 16 16" aria-hidden="true"><path d="M8 14 2.6 8.6a3.8 3.8 0 1 1 5.4-5.4 3.8 3.8 0 1 1 5.4 5.4Z" fill="#e05038"/></svg>
          <span class="chip-text"></span>
        </span>
        <span id="hud-tier" class="hud-chip">
          <span class="hud-sprite sprite f4"><img src="./assets/sprites/dragon-fly.png" alt=""></span>
          <span class="chip-text"></span>
        </span>
        <span id="hud-depth" class="hud-chip">
          <svg class="chip-icon" viewBox="0 0 16 16" aria-hidden="true"><path d="M1 1h4v4h4v4h4v4h2v2H1Z" fill="#b3a98f"/></svg>
          <span class="chip-text"></span>
        </span>
        <span id="hud-carried" class="hud-chip" title="Gold carried (lost if you fall!)">
          <svg class="chip-icon" viewBox="0 0 16 16" aria-hidden="true"><circle cx="8" cy="8" r="6.5" fill="#e8b93c"/><circle cx="8" cy="8" r="3.6" fill="none" stroke="#a3781c" stroke-width="1.4"/></svg>
          <span class="chip-text"></span>
        </span>
        <span id="hud-hoard" class="hud-chip" title="Banked hoard (always safe)">
          <svg class="chip-icon" viewBox="0 0 16 16" aria-hidden="true"><path d="M4 1h8v4a4 4 0 0 1-3 3.87V11h2v2h2v2H3v-2h2v-2h2V8.87A4 4 0 0 1 4 5Z" fill="#e8b93c"/></svg>
          <span class="chip-text"></span>
        </span>
        <button id="btn-quit" class="btn btn-small">Save &amp; Quit</button>
      </header>

      <div id="playfield">
        <div id="map" aria-label="dungeon map">
          <div id="map-grid"></div>
          <div id="player-token" hidden>
            <div class="sprite f4"><img src="./assets/sprites/dragon-fly.png" alt="your dragon"></div>
          </div>
        </div>
        <aside id="side">
          <canvas id="hoard-canvas" width="300" height="190"></canvas>
          <div id="hoard-label" class="hoard-label"></div>
          <div id="explore-log" class="log"></div>
          <p class="help-note">Move: arrow keys / WASD, or click a tile beside the dragon.</p>
        </aside>
      </div>

      <div id="combat-overlay" class="overlay" hidden>
        <div class="combat-box">
          <div id="combat-enemies" class="combat-row"></div>
          <div id="combat-player" class="combat-row"></div>
          <div id="combat-log" class="log combat-log"></div>
          <div id="combat-actions" class="combat-actions"></div>
        </div>
      </div>

      <div id="dpad" aria-label="movement controls">
        <button class="dpad-btn up" data-dx="0" data-dy="-1" aria-label="up">▲</button>
        <button class="dpad-btn left" data-dx="-1" data-dy="0" aria-label="left">◀</button>
        <button class="dpad-btn right" data-dx="1" data-dy="0" aria-label="right">▶</button>
        <button class="dpad-btn down" data-dx="0" data-dy="1" aria-label="down">▼</button>
      </div>

      <div id="result-overlay" class="overlay" hidden>
        <div class="result-box">
          <h2 id="result-title"></h2>
          <div id="result-growth" class="growth" hidden></div>
          <p id="result-body"></p>
          <div id="result-actions" class="menu"></div>
        </div>
      </div>
    </section>

  </div>
  <div id="dice-cinematic" class="dice-overlay" hidden></div>
  <div id="roll-toast" class="roll-toast" hidden></div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
