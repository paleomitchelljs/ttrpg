<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dragon Maze — Tile Editor</title>
<style>
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.4 system-ui, sans-serif; background: #1c1b22; color: #e8e4ef; display: flex; flex-direction: column; height: 100vh; }
  header { display: flex; gap: 10px; align-items: center; padding: 8px 12px; background: #26242e; border-bottom: 1px solid #3a3746; flex: none; }
  header select, header button { font: inherit; background: #34313f; color: #e8e4ef; border: 1px solid #4a4658; border-radius: 6px; padding: 5px 9px; }
  header button { cursor: pointer; }
  header button.primary { background: #3d6a4f; border-color: #4f8a66; }
  header button.primary:hover { background: #4a8060; }
  .modebtn.on { background: #4a5a8a; border-color: #6c86d0; }
  #status { margin-left: auto; color: #a9a4bb; font-size: 13px; }
  .maponly, .sheetonly { display: flex; gap: 10px; align-items: center; }
  main { display: flex; flex: 1; min-height: 0; }
  #palette { width: 190px; flex: none; overflow-y: auto; padding: 8px; background: #221f2a; border-right: 1px solid #3a3746; }
  #tagfilter { display: flex; flex-wrap: wrap; gap: 4px; margin-bottom: 8px; }
  #tagfilter button { font-size: 11px; padding: 2px 8px; border-radius: 20px; background: #2e2b38; color: #b8b3c9; border: 1px solid #43404f; cursor: pointer; }
  #tagfilter button.on { background: #4a5a8a; color: #fff; border-color: #6c86d0; }
  #swatches { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; align-content: start; }
  .swatch { background: #2e2b38; border: 2px solid transparent; border-radius: 6px; padding: 4px; cursor: pointer; text-align: center; }
  .swatch.on { border-color: #6cc0ff; }
  .swatch img { width: 100%; height: 50px; object-fit: contain; image-rendering: pixelated; display: block; }
  .swatch span { font-size: 10px; color: #b8b3c9; word-break: break-all; }
  .swatch em { font-size: 9px; color: #7f7a93; font-style: normal; display: block; }
  #stagewrap { flex: 1; overflow: auto; padding: 20px; }
  #stage { position: relative; background: #111; box-shadow: 0 0 0 1px #000; }
  .cell { position: absolute; box-sizing: border-box; }
  .cell.floor { background: #6f8a54; }
  .cell.wall { background: #6b5f4e; box-shadow: inset 0 0 0 1px #0003; }
  .cell.door { background: #9a723c; box-shadow: inset 0 0 0 2px #d9b877; }
  .cell.edge { box-shadow: inset 0 0 0 2px #e7d27a; }
  .cell.mark { outline: 1px dashed #ffffff33; outline-offset: -3px; }
  .obj { position: absolute; cursor: move; }
  .obj img { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; display: block; pointer-events: none; transform-origin: center; }
  .obj.sel { outline: 2px solid #6cc0ff; outline-offset: 1px; }
  /* sheet slicer */
  #sheetview { flex: 1; overflow: auto; padding: 20px; display: none; }
  #sheetview.on { display: block; }
  #sheetwrap { position: relative; display: inline-block; background: #2a0033; }
  #sheetimg { display: block; image-rendering: pixelated; }
  .box { position: absolute; border: 1px solid #00e6ff88; cursor: pointer; }
  .box:hover { border-color: #6cffff; background: #00e6ff22; }
  .box.sel { border: 2px solid #ffd24a; background: #ffd24a22; }
  #inspector, #sliceform { width: 220px; flex: none; padding: 10px; background: #221f2a; border-left: 1px solid #3a3746; overflow-y: auto; }
  #sliceform { display: none; }
  h3 { margin: 0 0 8px; font-size: 13px; color: #b8b3c9; }
  .row { display: flex; align-items: center; gap: 6px; margin-bottom: 7px; }
  .row label { width: 52px; color: #a9a4bb; }
  .row button { width: 26px; height: 26px; background: #34313f; color: #e8e4ef; border: 1px solid #4a4658; border-radius: 5px; cursor: pointer; }
  .row input { flex: 1; min-width: 0; background: #34313f; color: #e8e4ef; border: 1px solid #4a4658; border-radius: 5px; padding: 4px 6px; }
  .val { min-width: 34px; text-align: center; }
  .bigbtn { width: 100%; border-radius: 6px; padding: 7px; cursor: pointer; border: 1px solid; margin-top: 6px; }
  .bigbtn.go { background: #3d6a4f; border-color: #4f8a66; color: #fff; }
  .bigbtn.del { background: #6a3838; border-color: #8a4f4f; color: #fff; }
  .hint { color: #8a86a0; font-size: 12px; margin-top: 10px; line-height: 1.5; }
  kbd { background: #34313f; border: 1px solid #4a4658; border-radius: 4px; padding: 0 4px; font-size: 11px; }
</style>
</head>
<body>
<header>
  <button class="modebtn on" id="mMap">Map</button>
  <button class="modebtn" id="mSheet">Slice sheet</button>
  <span class="maponly">
    <label>Zone <select id="zoneSel"></select></label>
    <label>Region <select id="regionSel"></select></label>
    <button class="primary" id="saveBtn">Save scenery</button>
    <button id="scaleDown">−</button><button id="scaleUp">+</button>
  </span>
  <span class="sheetonly" style="display:none">
    <label>Sheet <select id="sheetSel"></select></label>
    <button id="detectBtn">Detect objects</button>
  </span>
  <span id="status"></span>
</header>
<main>
  <div id="palette">
    <div id="tagfilter"></div>
    <div id="swatches"></div>
  </div>
  <div id="stagewrap"><div id="stage"></div></div>
  <div id="sheetview"><div id="sheetwrap"><img id="sheetimg" alt=""></div></div>
  <div id="inspector"></div>
  <div id="sliceform"></div>
</main>
<script type="module" src="./editor.js"></script>
</body>
</html>
