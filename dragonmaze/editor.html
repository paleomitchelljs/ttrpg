<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dragon Maze — Tile Editor</title>
<style>
  :root { --tile: 40px; }
  * { box-sizing: border-box; }
  body { margin: 0; font: 14px/1.4 system-ui, sans-serif; background: #1c1b22; color: #e8e4ef; display: flex; flex-direction: column; height: 100vh; }
  header { display: flex; gap: 12px; align-items: center; padding: 8px 12px; background: #26242e; border-bottom: 1px solid #3a3746; flex: none; }
  header select, header button { font: inherit; background: #34313f; color: #e8e4ef; border: 1px solid #4a4658; border-radius: 6px; padding: 5px 9px; }
  header button.primary { background: #3d6a4f; border-color: #4f8a66; cursor: pointer; }
  header button.primary:hover { background: #4a8060; }
  #status { margin-left: auto; color: #a9a4bb; font-size: 13px; }
  main { display: flex; flex: 1; min-height: 0; }
  #palette { width: 180px; flex: none; overflow-y: auto; padding: 8px; background: #221f2a; border-right: 1px solid #3a3746; display: grid; grid-template-columns: 1fr 1fr; gap: 6px; align-content: start; }
  .swatch { background: #2e2b38; border: 2px solid transparent; border-radius: 6px; padding: 4px; cursor: pointer; text-align: center; }
  .swatch.on { border-color: #6cc0ff; }
  .swatch img { width: 100%; height: 54px; object-fit: contain; image-rendering: pixelated; display: block; }
  .swatch span { font-size: 10px; color: #b8b3c9; word-break: break-all; }
  #stagewrap { flex: 1; overflow: auto; padding: 20px; }
  #stage { position: relative; background: #111; box-shadow: 0 0 0 1px #000; image-rendering: pixelated; }
  .cell { position: absolute; width: var(--tile); height: var(--tile); box-sizing: border-box; }
  .cell.floor { background: #6f8a54; }
  .cell.wall { background: #6b5f4e; box-shadow: inset 0 0 0 1px #0003; }
  .cell.door { background: #9a723c; box-shadow: inset 0 0 0 2px #d9b877; }
  .cell.edge { box-shadow: inset 0 0 0 2px #e7d27a; }
  .cell.mark { outline: 1px dashed #ffffff33; outline-offset: -3px; }
  .grid-num { position: absolute; font-size: 9px; color: #ffffff44; pointer-events: none; }
  .obj { position: absolute; cursor: move; }
  .obj img { width: 100%; height: 100%; object-fit: contain; image-rendering: pixelated; display: block; pointer-events: none; transform-origin: center; }
  .obj.sel { outline: 2px solid #6cc0ff; outline-offset: 1px; }
  #inspector { width: 210px; flex: none; padding: 10px; background: #221f2a; border-left: 1px solid #3a3746; overflow-y: auto; }
  #inspector h3 { margin: 0 0 8px; font-size: 13px; color: #b8b3c9; }
  .row { display: flex; align-items: center; gap: 6px; margin-bottom: 7px; }
  .row label { width: 46px; color: #a9a4bb; }
  .row button { width: 26px; height: 26px; background: #34313f; color: #e8e4ef; border: 1px solid #4a4658; border-radius: 5px; cursor: pointer; }
  .row input { width: 52px; background: #34313f; color: #e8e4ef; border: 1px solid #4a4658; border-radius: 5px; padding: 3px 5px; }
  .val { min-width: 34px; text-align: center; }
  #inspector button.del { width: 100%; background: #6a3838; border: 1px solid #8a4f4f; color: #fff; border-radius: 6px; padding: 6px; cursor: pointer; margin-top: 6px; }
  .hint { color: #8a86a0; font-size: 12px; margin-top: 12px; line-height: 1.5; }
  kbd { background: #34313f; border: 1px solid #4a4658; border-radius: 4px; padding: 0 4px; font-size: 11px; }
</style>
</head>
<body>
<header>
  <label>Zone <select id="zoneSel"></select></label>
  <label>Region <select id="regionSel"></select></label>
  <button class="primary" id="saveBtn">Save scenery</button>
  <button id="scaleDown">−</button><button id="scaleUp">+</button>
  <span id="status"></span>
</header>
<main>
  <div id="palette"></div>
  <div id="stagewrap"><div id="stage"></div></div>
  <div id="inspector"></div>
</main>
<script type="module" src="./editor.js"></script>
</body>
</html>
