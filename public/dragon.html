<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Red Dragon Labyrinth</title>
  <style>
/* Red Dragon Labyrinth — dark cave theme, big readable type for a young
   player, high contrast, no external fonts. */

:root {
  --tile: clamp(28px, 4.2vmin, 44px);
  --bg: #14101a;
  --panel: #221a2c;
  --panel-2: #2c2138;
  --ink: #f3ecdd;
  --ink-dim: #b3a98f;
  --gold: #e8b93c;
  --ember: #e05038;
  --good: #6fce7e;
  --wall: #3b3247;
  --floor: #57492f;
  --floor-lit: #7a6640;
}

* { box-sizing: border-box; }

/* display rules below would otherwise beat the UA's [hidden] style */
[hidden] { display: none !important; }

html, body {
  margin: 0;
  min-height: 100%;
  background: var(--bg);
  color: var(--ink);
  font-family: Georgia, 'Times New Roman', serif;
  font-size: 18px;
}

button { font: inherit; }

.screen { min-height: 100vh; }

/* ------------------------------------------------------------- title */
.title-screen {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  gap: 0.6rem;
  background:
    radial-gradient(ellipse at 50% 90%, #33203a 0%, transparent 60%),
    var(--bg);
}

.title-screen h1 {
  font-size: clamp(2rem, 6vw, 3.4rem);
  margin: 0;
  color: var(--gold);
  text-shadow: 0 3px 0 #00000088;
  letter-spacing: 0.03em;
}

.title-dragon-img {
  width: clamp(140px, 28vw, 220px);
  image-rendering: pixelated;
  filter: drop-shadow(0 6px 14px #000c);
  animation: title-bob 3.2s ease-in-out infinite;
}

@keyframes title-bob {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-10px); }
}

.tagline { color: var(--ink-dim); margin: 0 0 1.2rem; font-style: italic; }

.title-hoard { color: var(--gold); margin-top: 1.4rem; }

/* ------------------------------------------------------------- buttons */
.btn {
  background: var(--ember);
  color: #fff;
  border: 3px solid #00000055;
  border-radius: 12px;
  padding: 0.55em 1.2em;
  font-size: 1.05rem;
  cursor: pointer;
  box-shadow: 0 3px 0 #00000066;
}

.btn:hover { filter: brightness(1.12); }
.btn:active { transform: translateY(2px); box-shadow: 0 1px 0 #00000066; }

.btn-big { font-size: 1.35rem; min-width: 12rem; }
.btn-small { font-size: 0.85rem; background: var(--panel-2); }

.menu { display: flex; flex-direction: column; gap: 0.8rem; align-items: center; }

/* ------------------------------------------------------------- HUD */
#hud {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  flex-wrap: wrap;
  padding: 0.5rem 0.9rem;
  background: var(--panel);
  border-bottom: 2px solid #00000066;
}

.hud-chip {
  display: inline-flex;
  align-items: center;
  gap: 0.4em;
  background: var(--panel-2);
  border-radius: 9px;
  padding: 0.25em 0.7em;
  font-size: 1.02rem;
  white-space: nowrap;
}

.chip-icon { width: 1em; height: 1em; flex: none; }

.hud-sprite { width: 1.6em; height: 1.6em; flex: none; margin: -0.3em 0; }

.hud-chip.danger { background: #5c1f18; color: #ffb4a6; }

#hud .btn-small { margin-left: auto; }

/* ------------------------------------------------------------- playfield */
#playfield {
  display: flex;
  gap: 1rem;
  padding: 1rem;
  align-items: flex-start;
  flex-wrap: wrap;
  justify-content: center;
}

#map {
  background: #0b0812;
  border-radius: 12px;
  border: 3px solid #00000099;
  overflow: hidden;
}

#map-grid {
  display: grid;
  gap: 0;
}

.tile {
  width: var(--tile);
  height: var(--tile);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: calc(var(--tile) * 0.68);
  user-select: none;
}

/* Seamless dungeon: no per-tile borders or gaps; the grid should read as
   continuous stone and passage, not as boxes. Once seen, always lit. */
.tile.fog { background: #0b0812; }
.tile.wall {
  background: #2b2138;
  box-shadow: inset 0 0 14px #00000055;
}
.tile.floor {
  background: var(--floor-lit);
  background-image: radial-gradient(ellipse at 30% 30%, #ffffff08 0%, transparent 60%);
}
.tile.steppable { cursor: pointer; }
.tile.steppable:hover { filter: brightness(1.3); }

/* ------------------------------------------------------------- sprites
   Animated strips: a clipping wrapper + an inner <img> that is N frames
   wide, stepped across by one frame per step. Frames are square. */

.sprite {
  position: relative;
  overflow: hidden;
  aspect-ratio: 1;
}

.sprite img {
  position: absolute;
  left: 0;
  top: 0;
  height: 100%;
  width: auto;
  image-rendering: pixelated;
}

.sprite.f2 img { animation: sprite-run 0.9s steps(2) infinite; }
.sprite.f4 img { animation: sprite-run 0.8s steps(4) infinite; }
.sprite.static img { animation: none; }
.sprite.flip { transform: scaleX(-1); }

@keyframes sprite-run {
  to { transform: translateX(-100%); }
}

#map { position: relative; }

#player-token {
  position: absolute;
  top: 0;
  left: 0;
  width: var(--tile);
  height: var(--tile);
  transition: transform 0.18s ease;
  pointer-events: none;
  filter: drop-shadow(0 2px 3px #000a);
  z-index: 2;
}

#player-token .sprite { width: 100%; height: 100%; }
#player-token.moving .sprite img { animation-duration: 0.35s; }

.tile-sprite {
  width: 92%;
  height: 92%;
  filter: drop-shadow(0 2px 2px #0009);
}

#side {
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
  width: 320px;
  max-width: 92vw;
}

#hoard-canvas {
  width: 100%;
  border-radius: 10px;
  border: 2px solid #00000088;
  background: #17111c;
}

.hoard-label { text-align: center; color: var(--gold); font-size: 1.05rem; }

.help-note { color: var(--ink-dim); font-size: 0.82rem; margin: 0; }

/* ------------------------------------------------------------- logs */
.log {
  background: var(--panel);
  border-radius: 10px;
  border: 2px solid #00000066;
  padding: 0.6rem 0.8rem;
  height: 11rem;
  overflow-y: auto;
  font-size: 0.98rem;
  line-height: 1.35;
}

.log p { margin: 0.15rem 0; }

.log-hit { color: var(--good); }
.log-hurt { color: #ff9d8a; }
.log-miss { color: var(--ink-dim); }
.log-dim { color: var(--ink-dim); font-size: 0.85rem; }
.log-start { color: var(--gold); font-weight: bold; }

/* ------------------------------------------------------------- overlays */
.overlay {
  position: fixed;
  inset: 0;
  background: #000000b8;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 1rem;
  z-index: 10;
}

.combat-box, .result-box {
  background: var(--panel);
  border: 3px solid var(--ember);
  border-radius: 16px;
  padding: 1rem 1.2rem;
  width: min(560px, 94vw);
  max-height: 92vh;
  overflow-y: auto;
  display: flex;
  flex-direction: column;
  gap: 0.7rem;
}

.result-box { border-color: var(--gold); text-align: center; }
.result-box h2 { margin: 0; color: var(--gold); }

.combat-row { display: flex; gap: 0.8rem; justify-content: center; flex-wrap: wrap; }

.enemy-card, #combat-player {
  background: var(--panel-2);
  border-radius: 12px;
  padding: 0.5rem 0.9rem;
  text-align: center;
  min-width: 8.5rem;
}

.enemy-card.dead { opacity: 0.45; filter: grayscale(0.8); }

.enemy-face { font-size: 2.3rem; line-height: 1.1; }
.enemy-name, .player-name { font-weight: bold; margin: 0.15rem 0; }

.combat-sprite {
  width: 76px;
  margin: 0 auto;
  filter: drop-shadow(0 3px 5px #000a);
}

.player-sprite { width: 88px; }

/* ---- battle beats (driven by combatView during event replay) ---- */

.enemy-card, #combat-player {
  transition: transform 0.22s ease, opacity 0.3s, filter 0.3s;
}

.enemy-card.lunge-down { transform: translateY(16px) scale(1.07); }
#combat-player.lunge-up { transform: translateY(-14px) scale(1.05); }

.hit-flash { animation: hit-shake 0.34s ease; }
.hit-flash .combat-sprite, .hit-flash .enemy-face { filter: brightness(2.1) sepia(0.7) hue-rotate(-45deg); }

@keyframes hit-shake {
  0%, 100% { translate: 0 0; }
  20% { translate: -6px 0; }
  40% { translate: 6px 0; }
  60% { translate: -4px 0; }
  80% { translate: 4px 0; }
}

.enemy-card.dying { opacity: 0.5; }
.enemy-card.dying .combat-sprite, .enemy-card.dead .combat-sprite {
  filter: grayscale(1) brightness(0.55);
  transform: rotate(90deg) translateX(12px);
  transition: transform 0.4s ease, filter 0.4s;
}
.enemy-card.dead .combat-sprite img, .enemy-card.fled .combat-sprite img { animation: none; }

.enemy-card.fleeing { transform: translateX(60px); opacity: 0.2; }
.enemy-card.fled .combat-sprite { filter: grayscale(0.8) opacity(0.6); transform: scaleX(-1); }

#combat-player.breathing .player-sprite { filter: drop-shadow(0 0 18px #ff8c2b) drop-shadow(0 3px 5px #000a); }

#combat-enemies.scorched { animation: scorch 0.9s ease; }

@keyframes scorch {
  0% { background: transparent; }
  30% { background: radial-gradient(ellipse at 50% 100%, #ff7b2b55 0%, transparent 70%); }
  100% { background: transparent; }
}

.hp-bar {
  height: 12px;
  background: #00000088;
  border-radius: 6px;
  overflow: hidden;
  margin: 0.2rem 0;
}

.hp-fill { height: 100%; background: var(--good); transition: width 0.35s ease; }
.hp-fill.low { background: var(--ember); }
.hp-num { font-size: 0.85rem; color: var(--ink-dim); }

.breath-btn { background: #c2601d; }
.btn:disabled { opacity: 0.45; cursor: default; transform: none; }
.btn:disabled:hover { filter: none; }

.badge-panic { font-size: 0.8rem; color: #ffb4a6; }
.badge-flee { font-size: 0.85rem; color: var(--ink-dim); font-style: italic; }
.enemy-card.fled { opacity: 0.4; }

.growth { text-align: center; }
.growth-dragon {
  font-size: 4.5rem;
  line-height: 1.1;
  animation: grow-pop 1.2s ease;
}
.growth-text { color: var(--gold); font-size: 1.1rem; margin-top: 0.3rem; }

@keyframes grow-pop {
  0% { transform: scale(0.25); opacity: 0; }
  55% { transform: scale(1.35); opacity: 1; }
  100% { transform: scale(1); }
}

.combat-log { height: 9rem; }

.combat-actions {
  display: flex;
  gap: 0.7rem;
  justify-content: center;
  flex-wrap: wrap;
  min-height: 3rem;
  align-items: center;
}

.attack-btn { font-size: 1.15rem; }

.turn-note { color: var(--ink-dim); font-style: italic; }

/* ------------------------------------------------------------- touch d-pad */

#dpad {
  position: fixed;
  right: 16px;
  bottom: 16px;
  z-index: 5;
  display: none;
  grid-template-columns: repeat(3, 56px);
  grid-template-rows: repeat(3, 56px);
  gap: 5px;
  opacity: 0.92;
}

.dpad-btn {
  background: var(--panel-2);
  color: var(--ink);
  border: 2px solid #00000088;
  border-radius: 12px;
  font-size: 1.35rem;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
  box-shadow: 0 3px 0 #00000066;
}

.dpad-btn:active { background: var(--ember); }
.dpad-btn.up { grid-area: 1 / 2; }
.dpad-btn.left { grid-area: 2 / 1; }
.dpad-btn.right { grid-area: 2 / 3; }
.dpad-btn.down { grid-area: 3 / 2; }

@media (hover: none) and (pointer: coarse) {
  #dpad { display: grid; }
  #playfield { padding-bottom: 200px; }
}

body.show-dpad #dpad { display: grid; }

/* ------------------------------------------------------------- cinematic dice
   BG3-style replay, matching the main portal's DiceOverlay: a tumbling hex
   die settles on the natural roll, modifier chips slide in, the total lands,
   and a verdict banner calls it. */

.dice-overlay {
  position: fixed;
  inset: 0;
  z-index: 60;
  display: flex;
  align-items: center;
  justify-content: center;
  background: #000000cc;
  cursor: pointer;
}

.dice-stage {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.55rem;
  padding: 1rem;
  text-align: center;
}

.dice-title {
  font-size: 1.5rem;
  color: var(--ink);
  font-weight: bold;
  letter-spacing: 0.03em;
}

.dice-target { color: var(--ink-dim); font-size: 1.05rem; }

.dice-tray { display: flex; gap: 0.8rem; justify-content: center; flex-wrap: wrap; }

.dice-die {
  position: relative;
  width: 104px;
  height: 114px;
  display: flex;
  align-items: center;
  justify-content: center;
  clip-path: polygon(50% 0%, 93% 25%, 93% 75%, 50% 100%, 7% 75%, 7% 25%);
  background: linear-gradient(160deg, #3a2b47 0%, #1c1426 70%);
  box-shadow: inset 0 0 0 3px var(--gold), inset 0 0 24px #e8b93c40;
  transition: transform 0.2s, opacity 0.3s, filter 0.3s;
}

.dice-die.small { width: 62px; height: 68px; }

.dice-die-num {
  font-size: 2.6rem;
  font-weight: bold;
  color: var(--ink);
  text-shadow: 0 2px 0 #000;
}

.dice-die.small .dice-die-num { font-size: 1.6rem; }

.dice-die-sides {
  position: absolute;
  bottom: 12px;
  font-size: 0.7rem;
  color: var(--ink-dim);
  letter-spacing: 0.06em;
}

.dice-die.spinning { animation: die-tumble 0.32s linear infinite; }

@keyframes die-tumble {
  0% { transform: rotate(-7deg) scale(1); }
  25% { transform: rotate(4deg) scale(1.06); }
  50% { transform: rotate(8deg) scale(0.98); }
  75% { transform: rotate(-5deg) scale(1.04); }
  100% { transform: rotate(-7deg) scale(1); }
}

.dice-die.settled { animation: die-land 0.3s cubic-bezier(0.2, 1.6, 0.4, 1); }

@keyframes die-land {
  0% { transform: scale(1.35); }
  100% { transform: scale(1); }
}

.dice-die.dropped { opacity: 0.35; filter: grayscale(0.8); transform: scale(0.8); }

.dice-die.nat20 {
  box-shadow: inset 0 0 0 3px var(--gold), 0 0 34px #e8b93cb0, inset 0 0 26px #e8b93c80;
  animation: die-land 0.3s cubic-bezier(0.2, 1.6, 0.4, 1), nat20-glow 1.1s ease-in-out infinite alternate;
}

@keyframes nat20-glow {
  from { filter: brightness(1); }
  to { filter: brightness(1.35); }
}

.dice-die.nat1 { box-shadow: inset 0 0 0 3px #6b6b6b, inset 0 0 24px #00000088; filter: saturate(0.4); }

.dice-mode { color: var(--gold); font-size: 0.95rem; letter-spacing: 0.04em; }

.dice-parts {
  display: flex;
  gap: 0.5rem;
  min-height: 1.8rem;
  opacity: 0;
  transform: translateY(8px);
  transition: opacity 0.3s, transform 0.3s;
}

.dice-parts.shown { opacity: 1; transform: none; }

.dice-part {
  background: var(--panel-2);
  border: 1px solid #ffffff22;
  border-radius: 999px;
  padding: 0.15em 0.8em;
  font-size: 1rem;
}

.dice-part em { color: var(--ink-dim); font-style: normal; font-size: 0.85em; }
.dice-part.neg { color: #ff9d8a; }

.dice-total {
  font-size: 3.2rem;
  font-weight: bold;
  color: var(--ink);
  text-shadow: 0 3px 0 #000;
  opacity: 0;
  transform: scale(0.6);
  transition: opacity 0.25s, transform 0.25s cubic-bezier(0.2, 1.6, 0.4, 1);
  line-height: 1.05;
}

.dice-total.shown { opacity: 1; transform: scale(1); }

.dice-verdict {
  font-size: 2rem;
  font-weight: bold;
  letter-spacing: 0.06em;
  min-height: 2.4rem;
  opacity: 0;
  transform: scale(0.5);
  transition: opacity 0.25s, transform 0.3s cubic-bezier(0.2, 1.8, 0.4, 1);
}

.dice-verdict.shown { opacity: 1; transform: scale(1); }
.dice-verdict.crit { color: var(--gold); text-shadow: 0 0 24px #e8b93c99, 0 3px 0 #000; }
.dice-verdict.good { color: var(--good); text-shadow: 0 3px 0 #000; }
.dice-verdict.bad { color: var(--ink-dim); }
.dice-verdict.fumble { color: #8b8b8b; }

.dice-hint { color: #ffffff55; font-size: 0.8rem; margin-top: 0.4rem; }

/* ------------------------------------------------------------- roll toast
   Compact corner card for monster rolls so their turns don't drag. */

.roll-toast {
  position: fixed;
  right: 18px;
  bottom: 18px;
  z-index: 70;
  background: var(--panel);
  border: 2px solid var(--ember);
  border-radius: 12px;
  padding: 0.6rem 0.9rem;
  box-shadow: 0 8px 24px #000c;
  animation: toast-in 0.2s ease;
  min-width: 15rem;
}

@keyframes toast-in {
  from { transform: translateY(12px); opacity: 0; }
  to { transform: none; opacity: 1; }
}

.roll-toast-title { font-weight: bold; margin-bottom: 0.35rem; font-size: 0.95rem; }

.roll-toast-body { display: flex; align-items: center; gap: 0.8rem; }

.roll-toast-math { display: flex; flex-direction: column; line-height: 1.2; }

.roll-toast-total { font-size: 1.5rem; font-weight: bold; }
.roll-toast-target { color: var(--ink-dim); font-size: 0.8rem; }
.roll-toast-verdict { font-weight: bold; font-size: 0.9rem; }
.roll-toast-verdict.crit { color: var(--gold); }
.roll-toast-verdict.good { color: #ff9d8a; }
.roll-toast-verdict.bad { color: var(--good); }
.roll-toast-verdict.fumble { color: var(--good); }

</style>
</head>
<body>
